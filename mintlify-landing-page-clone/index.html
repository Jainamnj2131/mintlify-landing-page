<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mintlify Hero Clone</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
  <div class="container nav-container">
    <div class="logo">mintlify</div>

    <nav class="nav-links">
      <a href="#">Resources</a>
      <a href="#">Documentation</a>
      <a href="#">Customers</a>
      <a href="#">Blog</a>
      <a href="#">Pricing</a>
    </nav>

    <div class="nav-actions">
      <a href="#" class="btn-outline">Contact sales</a>
      <a href="#" class="btn-light">Start for free</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="overlay"></div>

  <div class="container hero-content">

    <h1>
      The Intelligent<br>
      <span>Knowledge Platform</span>
    </h1>

    <p>
      Helping teams create and maintain world-class documentation built for both humans and AI.
    </p>

    <div class="email-box">
      <input type="email" placeholder="Email address">
      <button>Start now</button>
    </div>

    <div class="dashboard">
      <img src="assets/images/dashboard.png" alt="">
    </div>

  </div>
</section>

</body>
</html>
